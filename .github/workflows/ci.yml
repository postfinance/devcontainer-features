name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force-tests:
        description: 'Force build/test even if version is already published'
        required: false
        default: 'false'
        type: boolean

env:
  GO_VERSION: 1.25.9
  NODE_VERSION: 22

jobs:
  # Build Job
  build:
    strategy:
      matrix:
        feature: [
          "browsers",
          "build-essential",
          "claude-code",
          "cypress-deps",
          "docker-out",
          "dotnet",
          "eclipse-deps",
          "git-lfs",
          "gitlab-cli",
          "go",
          "gonovate",
          "goreleaser",
          "instant-client",
          "jfrog-cli",
          "kubectl",
          "locale",
          "make",
          "mingw",
          "nginx",
          "node",
          "npm-packages",
          "nvidia-cuda",
          "opencode",
          "playwright-deps",
          "python",
          "rust",
          "sonar-scanner-cli",
          "system-packages",
          "terraform",
          "timezone",
          "vault-cli",
          "zig"
        ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version already published
        id: check-version
        run: |
          if [[ "${{ inputs.force-tests }}" == "true" ]]; then
            echo "already_published=false" >> $GITHUB_OUTPUT
          else
            VERSION=$(jq -r '.version' features/src/${{ matrix.feature }}/devcontainer-feature.json)
            if docker manifest inspect "ghcr.io/postfinance/devcontainer-features/${{ matrix.feature }}:$VERSION" > /dev/null 2>&1; then
              echo "already_published=true" >> $GITHUB_OUTPUT
            else
              echo "already_published=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Setup environment
        if: steps.check-version.outputs.already_published == 'false'
        uses: ./.github/actions/setup-env
        with:
          go-version: ${{ env.GO_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Build
        if: steps.check-version.outputs.already_published == 'false'
        run: go run ./build --target "Feature:${{ matrix.feature }}:Package"

      - name: Test
        if: steps.check-version.outputs.already_published == 'false'
        run: go run ./build --target "Feature:${{ matrix.feature }}:Test"

  # Publish Job
  publish:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          go-version: ${{ env.GO_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Publish
        run: go run ./build --target "Features:Publish"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
